version: '3.8'

services:
  miniclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: miniclaw
    ports:
      - "8002:8002"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-qwen}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - BACKEND_PORT=8002
      - BACKEND_HOST=0.0.0.0
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  data:
    driver: local

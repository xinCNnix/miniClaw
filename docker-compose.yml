version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: miniclaw-backend
    ports:
      - "8002:8002"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-qwen}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - BACKEND_PORT=8002
      - BACKEND_HOST=0.0.0.0
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: miniclaw-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8002
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  data:
    driver: local
